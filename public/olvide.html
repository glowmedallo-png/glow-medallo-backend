    <div class="container">
        <h2>🔐 Recuperar contraseña</h2>
        <p>Ingresa tu correo electrónico registrado</p>
        <input type="email" id="email" placeholder="tu@email.com">
        <button onclick="solicitar()">Enviar enlace</button>
        <div id="mensaje" class="mensaje"></div>
        <p><a href="/login.html">← Volver al inicio de sesión</a></p>
    </div>
    <script>
        async function solicitar() {
            const email = document.getElementById('email').value;
            const div = document.getElementById('mensaje');
            if (!email) {
                div.innerHTML = '❌ Ingresa tu correo electrónico';
                div.className = 'mensaje error';
                return;
            }
            div.innerHTML = '📧 Enviando...';
            div.className = 'mensaje';
            try {
                const res = await fetch('/api/olvide-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (res.ok) {
                    div.innerHTML = '✅ ' + data.mensaje;
                    div.className = 'mensaje';
                } else {
                    div.innerHTML = '❌ ' + data.error;
                    div.className = 'mensaje error';
                }
            } catch (err) {
                div.innerHTML = '❌ Error de conexión';
                div.className = 'mensaje error';
            }
        }
    </script>
    <script src="/js/navbar.js"></script>
